  $('sparselist').querySelectorAll('.sprow').forEach(row => {
    const s = stats[decodeURIComponent(row.dataset.street)];
    const paths = () => s.keys.flatMap(k => [...$('docmap').querySelectorAll(`[data-e="${CSS.escape(k)}"]`)]);
    row.addEventListener('mouseenter', () => paths().forEach(p => p.classList.add('sphover')));
    row.addEventListener('mouseleave', () => paths().forEach(p => p.classList.remove('sphover')));
  });
  $('sparselist').querySelectorAll('.spico').forEach(btn => btn.addEventListener('click', () => {
    const row = btn.closest('.sprow');
    const name = decodeURIComponent(row.dataset.street);
    const s = stats[name];
    const mode = btn.dataset.mode;
    const allSet = s.keys.every(k => markedEdges.get(k) === mode);
    for (const k of s.keys) {
      if (allSet) markedEdges.delete(k); else markedEdges.set(k, mode);
      setMarkClass(k, allSet ? null : mode);
    }
    $('docapply').disabled = markedEdges.size === 0 && !pendingTakes.length;
    $('status').textContent = `${markedEdges.size} segment(s) marked — Apply marks when done, or Clear marks.`;
    updateAddrBadge();
    buildSparseSidebar(rt);   // refresh active-icon state
  }));
}

$('docclearmarks').addEventListener('click', () => {
  for (const [e] of markedEdges) setMarkClass(e, null);
  markedEdges.clear();
  pendingTakes = [];
  document.querySelectorAll('.takepending').forEach(el => el.remove());
  $('docapply').disabled = true;
  const rt = currentRoute();
  if (rt) buildSparseSidebar(rt);
  updateAddrBadge();
  $('status').textContent = 'All marks cleared.';
});

// --- split route: draw a chord across the route; verify (two colours) then confirm,
// which turns this route into two and re-runs each one's walk-order planning ---
const COLORS = ['#e15759', '#4e79a7', '#59a14f', '#f28e2b', '#b07aa1',
                '#76b7b2', '#edc948', '#ff9da7'];
let pendingSplit = null;   // {a: [features], b: [features]} awaiting confirm

$('docsplit').addEventListener('click', () => {
  const rt = currentRoute();
  const svg = $('docmap') && $('docmap').querySelector('svg');
  if (!rt || !svg || !docProj) return;
  cancelSplit();
  $('docview').classList.add('drawing');
  $('status').textContent = 'Press and drag a line right across the route where it should split, release to finish.';
  const ns = 'http://www.w3.org/2000/svg';
  const live = document.createElementNS(ns, 'polyline');
  live.setAttribute('fill', 'none');
  live.setAttribute('stroke', '#c00');
  live.setAttribute('stroke-width', '3');
  live.setAttribute('stroke-dasharray', '8 5');
  const pts = [];
  const toSvg = ev => {
    const r = svg.getBoundingClientRect();
    const M = docProj.M || 0;
    return [(ev.clientX - r.left) / r.width * (docProj.W + 2 * M) - M,
            (ev.clientY - r.top) / r.height * (docProj.H + 2 * M) - M];
  };
  const invPt = p => [docProj.minX + p[0] / docProj.W * (docProj.maxX - docProj.minX),
                      docProj.minY + (docProj.H - p[1]) / docProj.H * (docProj.maxY - docProj.minY)];
  const onMove = ev => {
    pts.push(toSvg(ev));
    live.setAttribute('points', pts.map(p => p.join(',')).join(' '));
  };
  const onUp = () => {
    svg.removeEventListener('pointermove', onMove);
    svg.removeEventListener('pointerup', onUp);
    live.remove();
    $('docview').classList.remove('drawing');
    toolJustFinished = Date.now();
    if (pts.length < 2) { $('status').textContent = 'Line too short — try again.'; return; }
    const chord = turf.lineString(pts.map(invPt));
    const groups = splitGroups(rt, chord);
    if (!groups) {
      $('status').textContent = "That line doesn't split the route into two connected parts — draw it right across.";
      return;
    }
    pendingSplit = groups;
    // verify: recolour side B blue so the two halves are obvious before committing
    const bKeys = new Set(groups.b.map(f => `${f.properties.u}|${f.properties.v}|${f.properties.k}`));
    $('docmap').querySelectorAll('.routepath[data-e]').forEach(p => {
      if (bKeys.has(p.dataset.e) && p.getAttribute('stroke') !== '#000')
        p.setAttribute('stroke', '#2563eb');
    });
    $('docsplitok').style.display = 'flex';
    $('docsplitcancel').style.display = 'flex';
    $('status').textContent =
      `Split preview: ${groups.a.length} segments stay ${'in ' + (rt.name || 'this route')}, ${groups.b.length} become a new route (blue). Confirm or cancel.`;
    updateAddrBadge();
  };
  svg.addEventListener('pointerdown', ev => {
    ev.preventDefault();
    svg.appendChild(live);
    pts.push(toSvg(ev));
    svg.addEventListener('pointermove', onMove);
    svg.addEventListener('pointerup', onUp);
  }, { once: true });
});

// partition rt's edges into the two connected sides of the drawn chord
function splitGroups(rt, chord) {
  const crossed = [], keep = [];
  for (const f of rt.edges.features) (turf.booleanIntersects(f, chord) ? crossed : keep).push(f);
  if (!crossed.length || !keep.length) return null;
  const parent = {};
  const find = x => { while (parent[x] !== undefined) x = parent[x]; return x; };
  const union = (x, y) => { x = find(x); y = find(y); if (x !== y) parent[x] = y; };
  for (const f of keep) union(f.properties.u, f.properties.v);
  const groups = {};
  for (const f of keep) {
    const r = find(f.properties.u);
    (groups[r] = groups[r] || []).push(f);
  }
  const comps = Object.values(groups).sort((x, y) => y.length - x.length);
  if (comps.length < 2) return null;   // the chord didn't disconnect anything
  const a = comps[0], b = comps[1];
  const nodesOf = fs => new Set(fs.flatMap(f => [f.properties.u, f.properties.v]));
  const aN = nodesOf(a), bN = nodesOf(b);
  // crossed edges + any stray extra components: repeatedly attach whatever touches a
  // side (sides grow as pieces join); anything never reached defaults to side A
  const pool = comps.slice(2).concat(crossed.map(f => [f]));
  let changed = true;
  while (changed) {
    changed = false;
    for (let i = pool.length - 1; i >= 0; i--) {
      const cN = nodesOf(pool[i]);
      const inA = [...cN].some(n => aN.has(n));
      const inB = !inA && [...cN].some(n => bN.has(n));
      if (inA || inB) {
        const side = inA ? a : b, sideN = inA ? aN : bN;
        side.push(...pool[i]);
        cN.forEach(n => sideN.add(n));
        pool.splice(i, 1);
        changed = true;
      }
    }
  }
  pool.forEach(c => a.push(...c));
  return { a, b };
}

function cancelSplit() {
  if (!pendingSplit) return;
  pendingSplit = null;
  $('docsplitok').style.display = 'none';
  $('docsplitcancel').style.display = 'none';
  const rt = currentRoute();
  if (rt) renderDocMap(rt);   // restore single-colour route
  updateAddrBadge();
}
$('docsplitcancel').addEventListener('click', () => { cancelSplit(); $('status').textContent = 'Split cancelled.'; });

$('docsplitok').addEventListener('click', async () => {
  const rt = currentRoute();
  if (!rt || !pendingSplit) return;
  const { a, b } = pendingSplit;
  pendingSplit = null;
  $('docsplitok').style.display = 'none';
  $('docsplitcancel').style.display = 'none';
  $('status').textContent = '⏳ Splitting — replanning both routes…';

  rt.edges = { type: 'FeatureCollection', features: a };
  rt.orig = null;                       // the confirm step was the safety; Reset no longer applies
  recomputeStreets(rt);
  rt.footprint = null;

  const nrt = {
    id: Math.max(...lastResult.routes.map(r => r.id)) + 1,
    color: COLORS[lastResult.routes.length % COLORS.length],
    edges: { type: 'FeatureCollection', features: b },
    top: rt.top, notes: '', order: [], walk: null, walk_km: 0,
  };
  recomputeStreets(nrt);
  const biggestNamed = r => (r.streets.find(s => !s.name.startsWith('(')) || {}).name || null;
  nrt.main = biggestNamed(nrt);
  nrt.name = nrt.main || '';
  rt.main = biggestNamed(rt) || rt.main;
  rt.name = rt.main || '';

  await rerouteWalk(rt);
  await rerouteWalk(nrt);
  const areaOf = r => { try { return Math.round(turf.area(turf.convex(r.edges)) / 10000) / 100; } catch (e) { return 0; } };
  rt.area_km2 = areaOf(rt);
  nrt.area_km2 = areaOf(nrt);

  const idx = lastResult.routes.indexOf(rt);
  lastResult.routes.splice(idx + 1, 0, nrt);
  render(lastResult);
  prepareRoutes(lastResult);
  await openDoc(rt);   // rt sits before nrt in the list — reopen the earlier of the two
  $('status').textContent = `Route split into ${rt.addresses} + ${nrt.addresses} addresses.`;
});

$('docapply').addEventListener('click', async () => {
  const rt = currentRoute();
  if (!rt || (!markedEdges.size && !pendingTakes.length)) return;
  if (!rt.orig) {   // first edit — keep the original so Reset can restore it
    rt.orig = JSON.parse(JSON.stringify(
      { edges: rt.edges, streets: rt.streets, order: rt.order, walk: rt.walk,
        walk_km: rt.walk_km, addresses: rt.addresses }));
  }
  const keep = [], orphanFs = [];
  let nRemoved = 0;
  for (const f of rt.edges.features) {
    const type = markedEdges.get(`${f.properties.u}|${f.properties.v}|${f.properties.k}`);
    if (!type) keep.push(f);
    else if (type === 'orphan') orphanFs.push(f);
    else nRemoved++;
  }
  if (!keep.length && !pendingTakes.length) {   // every segment marked — the route dissolves
    if (!confirm('Every segment is marked — delete this route entirely?')) return;
    for (const f of orphanFs) orphans.push({ f, from: rt.id });
    markedEdges.clear();
    lastResult.routes = lastResult.routes.filter(r => r !== rt);
    closeDoc();
    render(lastResult);
    prepareRoutes(lastResult);
    updateOrphanUI();
    $('status').textContent = `Route deleted — ${nRemoved} segment(s) dropped` +
      (orphanFs.length ? `, ${orphanFs.length} orphaned for another route.` : '.');
    return;
  }
  for (const f of orphanFs) orphans.push({ f, from: rt.id });
  const nOrphaned = orphanFs.length;
  markedEdges.clear();
  $('docapply').disabled = true;

  // commit pending takes: pull each segment out of its source (route or orphan pool)
  const takes = pendingTakes;
  pendingTakes = [];
  const touched = new Map();
  for (const t of takes) {
    const src = lastResult.routes.find(r => r.id === t.from);
    if (src) { src.edges.features = src.edges.features.filter(f => f !== t.f); touched.set(src.id, src); }
    orphans = orphans.filter(o => o.f !== t.f);
    keep.push(t.f);
  }
  if (takes.length) (rt.takenLog = rt.takenLog || []).push(...takes);   // Reset returns these to the orphan pool

  rt.edges = { type: 'FeatureCollection', features: keep };
  recomputeStreets(rt);
  $('status').textContent = '⏳ Recalculating walk order…';
  await rerouteWalk(rt);
  for (const src of touched.values()) {
    if (!src.edges.features.length) { lastResult.routes = lastResult.routes.filter(r => r !== src); continue; }
    recomputeStreets(src);
    await rerouteWalk(src);
    refreshLayer(src);
  }
  if (takes.length) render(lastResult);   // sidebar link counts + any dissolved source route
  updateOrphanUI();
  $('status').textContent = `Marks applied — ${nRemoved} segment(s) removed` +
    (nOrphaned ? `, ${nOrphaned} orphaned for another route` : '') +
    (takes.length ? `, ${takes.length} taken from other routes` : '') + '.';
  refreshRoute(rt);
});

// live address-count badge: what this route currently holds, and what pending
// marks/takes/a split preview would leave it (and its new sibling) with
function updateAddrBadge() {
  const rt = currentRoute();
  const badge = $('docaddrbadge');
  if (!rt) { badge.innerHTML = ''; return; }
  const addrOf = f => f.properties.addresses || 0;
  if (pendingSplit) {
    const na = pendingSplit.a.reduce((n, f) => n + addrOf(f), 0);
    const nb = pendingSplit.b.reduce((n, f) => n + addrOf(f), 0);
    const nextColor = COLORS[lastResult.routes.length % COLORS.length];
    badge.innerHTML = `<span style="color:${rt.color}">●</span> <b>${na}</b> + ` +
      `<span style="color:${nextColor}">●</span> <b>${nb}</b> addr`;
    return;
  }
  let removed = 0;
  for (const [k, mode] of markedEdges) {
    if (mode !== 'remove' && mode !== 'orphan') continue;
    const f = rt.edges.features.find(f => `${f.properties.u}|${f.properties.v}|${f.properties.k}` === k);
    if (f) removed += addrOf(f);
  }
  const added = pendingTakes.reduce((n, t) => n + addrOf(t.f), 0);
  if (!removed && !added) { badge.innerHTML = `<b>${rt.addresses}</b> addr`; return; }
  const bits = [`${rt.addresses}`];
  if (removed) bits.push(`<span style="color:#f77">− ${removed}</span>`);
  if (added) bits.push(`<span style="color:#6d6">+ ${added}</span>`);
  badge.innerHTML = `${bits.join(' ')} = <b>${rt.addresses - removed + added}</b> addr`;
}

function recomputeStreets(rt) {
  const partial = {};   // keep cross-route PART flags from the existing table
  for (const s of rt.streets || []) partial[s.name] = s.partial;
  const streets = {};
  let total = 0;
  for (const f of rt.edges.features) {
    const p = f.properties;
    const s = streets[p.name] = streets[p.name] || { name: p.name, addresses: 0, partial: !!partial[p.name] };
    s.addresses += p.addresses || 0;
    total += p.addresses || 0;
  }
  rt.streets = Object.values(streets)
    .filter(s => s.addresses > 0 || !s.name.startsWith('('))
    .sort((a, b) => b.addresses - a.addresses);
  rt.addresses = total;
}

async function rerouteWalk(rt, useElevation = false) {
  try {
    const r = await fetch('/reroute', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        polygon: selGeom,
        edges: rt.edges.features.map(f => [f.properties.u, f.properties.v, f.properties.k]),
        allowed: rt.streets.map(s => s.name),
        top: rt.top || null,
        use_elevation: useElevation,
      }),
    });
    const j = await r.json();
    if (j.error) throw new Error(j.error);
    rt.order = j.order;
    rt.walk = j.walk;
    rt.walk_km = j.walk_km;
    if (j.top) rt.top = j.top;   // walk start moves when edges change — keep the ▲ marker in sync
  } catch (err) {
    $('status').textContent = '❌ Replan failed: ' + err.message;
  }
}

function refreshLayer(rt) {
  rt.footprint = computeFootprint(rt);   // area changed
  if (rt.layer) routesLayer.removeLayer(rt.layer);
  rt.layer = L.geoJSON(rt.edges, { style: routeStyle(rt, false) }).addTo(routesLayer);
  rt.layer.on('mouseover', () => setRouteMode(rt.id));
  rt.layer.on('mouseout', () => setRouteMode(null));
  if (rt.hoverLayer) { hoverLayer.removeLayer(rt.hoverLayer); rt.hoverLayer = null; }
}

function refreshRoute(rt) {
  refreshLayer(rt);
  refreshDoc(rt);               // keeps the erase toggle as-is for multi-segment edits
  saveState();
}

$('docreset').addEventListener('click', resetRoute);
function resetRoute() {
  const rt = currentRoute();
  if (!rt || !rt.orig) return;
  // segments taken from other routes can't go back where they came from (the sources
  // have already replanned without them) — return them to the orphan pool instead
  for (const t of rt.takenLog || []) orphans.push(t);
  rt.takenLog = null;
  Object.assign(rt, JSON.parse(JSON.stringify(rt.orig)));
  rt.orig = null;
  // any streets this route orphaned come back with it — they're in its edges again
  orphans = orphans.filter(o => o.from !== rt.id);
  updateOrphanUI();
  $('docreset').disabled = true;
  refreshRoute(rt);
}

// --- print: single route document (with vector map) ---
$('docprint').addEventListener('click', () => {
  document.body.classList.add('printdoc');
  window.print();
});
window.addEventListener('afterprint', () => document.body.classList.remove('printdoc'));

// --- print: full pack, as a generated PDF (not the browser's print engine) — laid out with
// explicit mm coordinates so page breaks land exactly where intended (Notes always starts
// its own page instead of the browser guessing where content overflows) ---
function mm2px(mm, dpi = 150) { return Math.round(mm * dpi / 25.4); }

// rasterise an SVG string to a PNG data URL via an offscreen canvas — routeSVG already
// inlines every style as attributes, so this needs no stylesheet/DOM attachment
function svgToPngDataUrl(svgStr, pxW, pxH) {
  return new Promise((resolve, reject) => {
    const blob = new Blob([svgStr], { type: 'image/svg+xml;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = pxW; canvas.height = pxH;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, pxW, pxH);
      ctx.drawImage(img, 0, 0, pxW, pxH);
      URL.revokeObjectURL(url);
      resolve(canvas.toDataURL('image/png'));
    };
    img.onerror = err => { URL.revokeObjectURL(url); reject(err); };
    img.src = url;
  });
}

function hexRgb(hex) {
  const m = hex.match(/\w\w/g) || ['00', '00', '00'];
  return m.map(h => parseInt(h, 16));
}

// this route's own lines + its number, shown in place within the outline of the whole
// ward — so a volunteer can see where their patch sits in the bigger picture
function routeMiniSVG(rt, wardBbox, wardOutline, aspect) {
  let [minX, minY, maxX, maxY] = wardBbox;
  let dx = maxX - minX, dy = maxY - minY;
  minX -= dx * 0.04; maxX += dx * 0.04; minY -= dy * 0.04; maxY += dy * 0.04;
  dx = maxX - minX; dy = maxY - minY;
  const latScale = Math.cos((minY + maxY) / 2 * Math.PI / 180);
  const target = aspect || 1;
  if ((dx * latScale) / dy < target) { const add = (dy * target / latScale - dx) / 2; minX -= add; maxX += add; }
  else { const add = (dx * latScale / target - dy) / 2; minY -= add; maxY += add; }
  const W = 400, H = W * ((maxY - minY) / ((maxX - minX) * latScale));
  const px = lon => (lon - minX) / (maxX - minX) * W;
  const py = lat => H - (lat - minY) / (maxY - minY) * H;
  const path = coords => coords.map((c, i) => `${i ? 'L' : 'M'}${px(c[0]).toFixed(1)} ${py(c[1]).toFixed(1)}`).join('');

  const rings = (wardOutline.type === 'MultiPolygon' ? wardOutline.coordinates.flat() : wardOutline.coordinates);
  const outline = rings.map(ring => `<path d="${path(ring)}Z" fill="#f6f6f6" stroke="#aaa" stroke-width="2.5"/>`).join('');

  let route = '';
  for (const f of rt.edges.features)
    route += `<path d="${path(f.geometry.coordinates)}" fill="none" stroke="${rt.color}" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>`;

  const c = turf.centroid(rt.footprint).geometry.coordinates;
  const nx = px(c[0]).toFixed(1), ny = py(c[1]).toFixed(1);
  return `<svg viewBox="0 0 ${W.toFixed(0)} ${H.toFixed(0)}" xmlns="http://www.w3.org/2000/svg">
    <rect width="100%" height="100%" fill="#fff"/>
    ${outline}
    ${route}
    <circle cx="${nx}" cy="${ny}" r="15" fill="#fff" stroke="${rt.color}" stroke-width="2.5"/>
    <text x="${nx}" y="${ny}" font-size="15" font-weight="700" fill="#111"
      text-anchor="middle" dominant-baseline="central" style="font-family:system-ui">${rt.num || rt.id}</text>
  </svg>`;
}

// whole-ward overview: every route's own lines in its own colour, numbered at its centroid
function wardIndexSVG(routes, wm, wardBbox, wardOutline, aspect) {
  let [minX, minY, maxX, maxY] = wardBbox;
  let dx = maxX - minX, dy = maxY - minY;
  minX -= dx * 0.04; maxX += dx * 0.04; minY -= dy * 0.04; maxY += dy * 0.04;
  dx = maxX - minX; dy = maxY - minY;
  const latScale = Math.cos((minY + maxY) / 2 * Math.PI / 180);
  const target = aspect || 1.3;
  if ((dx * latScale) / dy < target) { const add = (dy * target / latScale - dx) / 2; minX -= add; maxX += add; }
  else { const add = (dx * latScale / target - dy) / 2; minY -= add; maxY += add; }
  const W = 1400, H = W * ((maxY - minY) / ((maxX - minX) * latScale));
  const px = lon => (lon - minX) / (maxX - minX) * W;
  const py = lat => H - (lat - minY) / (maxY - minY) * H;
  const path = coords => coords.map((c, i) => `${i ? 'L' : 'M'}${px(c[0]).toFixed(1)} ${py(c[1]).toFixed(1)}`).join('');
  const inView = c => c[0] >= minX && c[0] <= maxX && c[1] >= minY && c[1] <= maxY;

  const rings = (wardOutline.type === 'MultiPolygon' ? wardOutline.coordinates.flat() : wardOutline.coordinates);
  const outline = rings.map(ring => `<path d="${path(ring)}Z" fill="#f6f6f6" stroke="#999" stroke-width="2"/>`).join('');

  let roads = '';
  for (const rd of (wm.roads || [])) {
    if (!rd.coords.some(inView)) continue;
    roads += `<path d="${path(rd.coords)}" fill="none" stroke="#ccc" stroke-width="2" stroke-linecap="round"/>`;
  }
  let routePaths = '';
  for (const rt of routes)
    for (const f of rt.edges.features)
      routePaths += `<path d="${path(f.geometry.coordinates)}" fill="none" stroke="${rt.color}" stroke-width="4.5" stroke-linecap="round" opacity="0.85"/>`;
  let labels = '';
  for (const rt of routes) {
    const c = turf.centroid(rt.footprint).geometry.coordinates;
    const x = px(c[0]).toFixed(1), y = py(c[1]).toFixed(1);
    labels += `<circle cx="${x}" cy="${y}" r="16" fill="#fff" stroke="${rt.color}" stroke-width="2.5"/>` +
      `<text x="${x}" y="${y}" font-size="16" font-weight="700" fill="#111" text-anchor="middle" dominant-baseline="central" style="font-family:system-ui">${rt.num || rt.id}</text>`;
  }
  return `<svg viewBox="0 0 ${W.toFixed(0)} ${H.toFixed(0)}" xmlns="http://www.w3.org/2000/svg">
    <rect width="100%" height="100%" fill="#fff"/>
    ${outline}${roads}${routePaths}${labels}
  </svg>`;
}

async function buildRoutesPackPdf() {
  const pdf = new window.jspdf.jsPDF({ unit: 'mm', format: 'a4' });
  const pageW = 210, pageH = 297, margin = 15, contentW = pageW - margin * 2;
  const instrLines = $('instructions').value.split('\n').map(l => l.replace(/^[•\-]\s*/, '').trim()).filter(Boolean);
  const wm = wardMapData || { buildings: [], roads: [], pois: [] };
  const wardOutline = selGeom;
  const wardBbox = turf.bbox(wardOutline);

  // ---- Index page: whole ward, every route numbered at its centroid ----
  pdf.setFont(undefined, 'bold'); pdf.setFontSize(16); pdf.setTextColor(0);
  pdf.text('Index — all routes', margin, margin);
  const idxMapH = pageH - margin * 2 - 8;
  const idxSvg = wardIndexSVG(lastResult.routes, wm, wardBbox, wardOutline, contentW / idxMapH);
  const idxPng = await svgToPngDataUrl(idxSvg, mm2px(contentW), mm2px(idxMapH));
  pdf.addImage(idxPng, 'PNG', margin, margin + 8, contentW, idxMapH);

  const routeHeader = rt => {
    let y = margin;
    const [r, g, b] = hexRgb(rt.color);
    pdf.setFillColor(r, g, b);
    pdf.rect(margin, y - 4, 5, 5, 'F');
    pdf.setFont(undefined, 'bold'); pdf.setFontSize(13); pdf.setTextColor(0);
    pdf.text(`Route ${rt.num || rt.id}${rt.name ? ': ' + rt.name : ''}`, margin + 8, y);
    y += 4;
    pdf.setDrawColor(20); pdf.setLineWidth(0.4);
    pdf.line(margin, y, pageW - margin, y);
    return y + 6;
  };

  for (const rt of lastResult.routes) {
    // one route = one flowing document: sections pack onto shared pages, a new page
    // only where content genuinely doesn't fit — not a hard break per section
    pdf.addPage();
    let y = routeHeader(rt);

    // a) minimap + instructions, two columns
    const miniSize = 55;
    const miniSvg = routeMiniSVG(rt, wardBbox, wardOutline, 1);
    const miniPng = await svgToPngDataUrl(miniSvg, mm2px(miniSize), mm2px(miniSize));
    pdf.addImage(miniPng, 'PNG', margin, y, miniSize, miniSize);
    const textX = margin + miniSize + 8, textW = contentW - miniSize - 8;
    pdf.setFont(undefined, 'bold'); pdf.setFontSize(12); pdf.setTextColor(0);
    pdf.text('Instructions for volunteers', textX, y + 4);
    let iy = y + 10;
    pdf.setFont(undefined, 'normal'); pdf.setFontSize(9.5);
    for (const line of instrLines) {
      const wrapped = pdf.splitTextToSize('•  ' + line, textW);
      pdf.text(wrapped, textX, iy);
      iy += wrapped.length * 4.6;
    }
    y += miniSize + 10;

    // b) the map — only a fresh page if it wouldn't get reasonable room here
    const mapH = 90;
    if (y + mapH > pageH - margin) { pdf.addPage(); y = routeHeader(rt); }
    pdf.setFont(undefined, 'normal'); pdf.setFontSize(10); pdf.setTextColor(70);
    let meta = `${rt.addresses} addresses`;
    if (rt.walk_km) meta += ` · ${rt.walk_km} km`;
    const mins = Math.round((rt.walk_km || 0) / 4 * 60 + rt.addresses * 0.25);
    if (mins) meta += ` · ~${mins} min`;
    if (rt.main) meta += ` · Main road: ${rt.main}`;
    if (rt.top) meta += ` · start at the top, walk downhill`;
    pdf.text(meta, margin, y);
    y += 6;
    const svgStr = routeSVG(rt, contentW / mapH);
    const png = await svgToPngDataUrl(svgStr, mm2px(contentW), mm2px(mapH));
    pdf.addImage(png, 'PNG', margin, y, contentW, mapH);
    y += mapH + 8;

    // c) suggested walk order
    pdf.setFont(undefined, 'normal'); pdf.setFontSize(9.5);
    const orderLines = pdf.splitTextToSize((rt.order || []).join('  ->  '), contentW);
    const orderH = 6 + orderLines.length * 4.6;
    if (y + orderH > pageH - margin) { pdf.addPage(); y = routeHeader(rt); }
    pdf.setFont(undefined, 'bold'); pdf.setFontSize(12); pdf.setTextColor(0);
    pdf.text('Suggested walk order', margin, y); y += 6;
    pdf.setFont(undefined, 'normal'); pdf.setFontSize(9.5);
    pdf.text(orderLines, margin, y);
    y += orderLines.length * 4.6 + 8;

    // d) streets
    if (y + 12 > pageH - margin) { pdf.addPage(); y = routeHeader(rt); }
    pdf.setFont(undefined, 'bold'); pdf.setFontSize(12);
    pdf.text('Streets', margin, y); y += 6;
    const rowH = 6, col2 = pageW - margin - 45, col3 = pageW - margin - 15;
    pdf.setFontSize(9.5);
    for (const s of rt.streets) {
      if (y > pageH - margin - rowH) { pdf.addPage(); y = routeHeader(rt); }
      pdf.setDrawColor(215);
      pdf.line(margin, y + 1.8, pageW - margin, y + 1.8);
      let label = s.name + (s.partial ? '  (PART — see map)' : '');
      label = pdf.splitTextToSize(label, col2 - margin - 3)[0];
      pdf.setFont(undefined, 'normal');
      pdf.text(label, margin + 1, y);
      pdf.text(String(s.addresses), col2, y);
      pdf.rect(col3, y - 3.2, 3.5, 3.5);
      y += rowH;
    }
    y += 8;

    // e) notes — fills whatever gap is left on this page; only starts a fresh page
    // if less than 10% of a page remains, so it's never squeezed into a sliver
    const usableH = pageH - margin * 2;
    if ((pageH - margin - y) < usableH * 0.10) { pdf.addPage(); y = routeHeader(rt); }
    pdf.setFont(undefined, 'bold'); pdf.setFontSize(12); pdf.setTextColor(0);
    pdf.text('Notes', margin, y); y += 8;
    pdf.setFont(undefined, 'normal'); pdf.setFontSize(10.5);
    if (rt.notes) {
      pdf.text(pdf.splitTextToSize(rt.notes, contentW), margin, y);
    } else {
      pdf.setDrawColor(220);
      for (let ly = y; ly < pageH - margin; ly += 8) pdf.line(margin, ly, pageW - margin, ly);
    }
  }
  return pdf;
}

function pdfStatus(msg) {
  const el = $('pdfstatus');
  if (msg == null) { el.style.display = 'none'; return; }
  el.textContent = msg;
  el.style.display = 'block';
}

$('printpdf').addEventListener('click', async () => {
  if (!lastResult) return;
  $('printpdf').disabled = true;
  pdfStatus('⏳ Building routes pack PDF…');
  try {
    if (!wardMapData) await fetchWardMap();
    for (const rt of lastResult.routes) if (!rt.footprint) rt.footprint = computeFootprint(rt);
    const pdf = await buildRoutesPackPdf();
    pdf.save('routes-pack.pdf');
    pdfStatus('✅ Routes pack PDF downloaded.');
    setTimeout(() => pdfStatus(null), 3000);
  } catch (err) {
    pdfStatus('❌ PDF failed: ' + err.message);
    setTimeout(() => pdfStatus(null), 5000);
  } finally {
    $('printpdf').disabled = false;
  }
});

// =============================== boot ===============================
restoreState();
</script>
